version: '3.8'

services:
  mysql-master:
    image: mysql:8.0
    container_name: mysql-master
    restart: always
    command: --server-id=1 --log-bin=mysql-bin
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - ./master-data:/var/lib/mysql

  mysql-slave:
    image: mysql:8.0
    container_name: mysql-slave
    restart: always
    command: --server-id=2 --relay-log=relay-log
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3308:3306"
    depends_on:
      - mysql-master
    volumes:
      - ./slave-data:/var/lib/mysql