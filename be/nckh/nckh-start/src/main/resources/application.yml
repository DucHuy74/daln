server:
  port: ${SERVER_PORT}
  servlet:
    context-path: ${SERVER_CONTEXT_PATH}

spring:
  graphql:
    path: /graphql
  config:
    import: optional:file:.env
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      username: ${REDIS_USERNAME}
      password: ${REDIS_PASSWORD}
      timeout: ${REDIS_TIMEOUT}

  datasource:
#    url: ${DB_URL}
#    username: ${DB_USERNAME}
#    password: ${DB_PASSWORD}
#    driver-class-name: ${DB_DRIVER}
    master:
      url: ${DB_MASTER_URL}
      username: ${DB_MASTER_USERNAME}
      password: ${DB_MASTER_PASSWORD}

    slave:
      url: ${DB_SLAVE_URL}
      username: ${DB_SLAVE_USERNAME}
      password: ${DB_SLAVE_PASSWORD}

    hikari:
      max-lifetime: ${DB_MAX_LIFETIME}
      idle-timeout: ${DB_IDLE_TIMEOUT}
      keepalive-time: ${DB_KEEPALIVE_TIME}
      validation-timeout: ${DB_VALIDATION_TIMEOUT}
      connection-timeout: ${DB_CONNECTION_TIMEOUT}
      maximum-pool-size: ${DB_MAX_POOL_SIZE}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO}
    show-sql: ${JPA_SHOW_SQL}

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}

  neo4j:
    uri: neo4j+s://d64a682c.databases.neo4j.io
    authentication:
      username: neo4j
      password: HdwlHzHdYhAqaJYfEPhhIPWWNtoilzXPfI4gWvYQNME
    data:
      neo4j:
        database: neo4j

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

jobrunr:
  background-job-server:
    enabled: true
  dashboard:
    enabled: true
    port: ${JOBRUNR_DASHBOARD_PORT}

idp:
  url: ${KEYCLOAK_URL}
  client-id: ${KEYCLOAK_CLIENT_ID}
  client-secret: ${KEYCLOAK_CLIENT_SECRET}

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    com.xxxx.backend_mvc: DEBUG
